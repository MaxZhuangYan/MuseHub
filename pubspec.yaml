name: musehub
description: A Flutter mobile rebuild of AlgerMusicPlayer focused on search, discovery, queue playback, lyrics, and library workflows.
publish_to: "none"
version: 0.1.1+2

environment:
  sdk: ">=3.4.0 <4.0.0"

dependencies:
  cached_network_image: ^3.4.1
  crypto: ^3.0.7
  cupertino_icons: ^1.0.8
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  google_fonts: ^6.2.1
  http: ^1.2.2
  palette_generator: ^0.3.3
  just_audio: ^0.9.42
  path_provider: ^2.1.5
  provider: ^6.1.2
  shared_preferences: ^2.3.2
  multicast_dns: ^0.3.3+1

dev_dependencies:
  flutter_lints: ^4.0.0
  flutter_test:
    sdk: flutter

flutter:
  uses-material-design: true
